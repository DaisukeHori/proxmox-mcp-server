# Auto-merge workflow for mcp-doctor PRs
#
# mcp-doctor ラベル付き PR が作成されたら:
# 1. ビルドチェック
# 2. パスすれば自動マージ
#
# 各MCPリポジトリの .github/workflows/ にコピーして使用

name: Auto Merge - MCP Doctor PRs

on:
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-merge:
    # mcp-doctor ラベルが付いた PR のみ対象
    if: contains(github.event.pull_request.labels.*.name, 'mcp-doctor')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: false

      # ビルドが通ったら自動マージ
      - name: Auto-merge PR
        if: success()
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch \
            --subject "fix: mcp-doctor auto-fix (#${{ github.event.pull_request.number }})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
